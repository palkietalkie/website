name: Deploy to Vercel

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Only deploy after Test completes successfully on main (or on manual dispatch).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel (production)
        run: |
          # Vercel CLI reads .git to detect the commit author and blocks deploys on the Hobby plan if the author isn't the team owner.
          rm -rf .git
          vercel --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=gitauto --prod
